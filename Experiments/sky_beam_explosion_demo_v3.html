<style>
@keyframes boom-pop {
  0% { transform: scale(0.2); opacity: 1; }
  60% { transform: scale(1.3); opacity: 0.8; }
  100% { transform: scale(1.8); opacity: 0; }
}
.boom {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  animation: boom-pop 0.4s ease-out forwards;
}
@keyframes ring-expand {
  0% { transform: scale(0.1); opacity: 0.9; }
  100% { transform: scale(1); opacity: 0; }
}
.ring {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  border: 3px solid #ffb27a;
  animation: ring-expand 0.55s ease-out forwards;
}
@keyframes ember-fly {
  0% { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--ex), var(--ey)) scale(0.3); opacity: 0; }
}
.ember {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  animation: ember-fly 0.6s ease-out forwards;
}
@keyframes scorch-fade {
  0% { opacity: 0.55; }
  100% { opacity: 0; }
}
.scorch {
  position: absolute;
  border-radius: 50%;
  background: #2C2C2A;
  pointer-events: none;
  animation: scorch-fade 1.4s ease-out forwards;
}
</style>
<h2 class="sr-only">Demo of a beam striking down from the sky with a clean drop and a bigger layered explosion on impact</h2>
<div id="arena-wrap" style="position: relative; height: 320px; background: var(--surface-1); border-radius: 12px; overflow: hidden; border: 0.5px solid var(--border); transition: background 0.15s;">
  <div id="dark-overlay" style="position:absolute; inset:0; background:#05070a; opacity:0; pointer-events:none; transition: opacity 0.12s;"></div>
  <div id="floor-line" style="position:absolute; left:0; right:0; bottom:70px; height:2px; background:#444441; opacity:0.5;"></div>
  <svg id="fx-svg" width="100%" height="100%" style="position:absolute; top:0; left:0; pointer-events:none;">
    <defs>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
  </svg>
  <div id="target-dot" style="position:absolute; bottom:76px; left:50%; transform: translateX(-50%); width:28px; height:28px; border-radius:50%; background:#D85A30; transition: filter 0.1s, transform 0.1s;"></div>
  <div id="flash-overlay" style="position:absolute; inset:0; background:#ffd9c2; opacity:0; pointer-events:none;"></div>
</div>

<div style="display:flex; gap:12px; margin-top:1rem;">
  <button id="wipe-btn">Sky beam</button>
</div>

<script>
const arena = document.getElementById('arena-wrap');
const darkOverlay = document.getElementById('dark-overlay');
const svg = document.getElementById('fx-svg');
const flash = document.getElementById('flash-overlay');
const targetDot = document.getElementById('target-dot');
const btn = document.getElementById('wipe-btn');
const floorY = () => arena.clientHeight - 70;

function spawnBoom(x, y, size, color) {
  const el = document.createElement('div');
  el.className = 'boom';
  el.style.width = size + 'px';
  el.style.height = size + 'px';
  el.style.left = (x - size/2) + 'px';
  el.style.top = (y - size/2) + 'px';
  el.style.background = color;
  arena.appendChild(el);
  setTimeout(() => el.remove(), 420);
}

function spawnRing(x, y, size) {
  const el = document.createElement('div');
  el.className = 'ring';
  el.style.width = size + 'px';
  el.style.height = size + 'px';
  el.style.left = (x - size/2) + 'px';
  el.style.top = (y - size/2) + 'px';
  arena.appendChild(el);
  setTimeout(() => el.remove(), 570);
}

function spawnEmbers(x, y, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 30 + Math.random() * 65;
    const ex = Math.cos(angle) * dist;
    const ey = Math.sin(angle) * dist * 0.6 - 15;
    const size = 4 + Math.random() * 5;
    const el = document.createElement('div');
    el.className = 'ember';
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.left = (x - size/2) + 'px';
    el.style.top = (y - size/2) + 'px';
    el.style.background = Math.random() > 0.5 ? '#ffb27a' : '#F0997B';
    el.style.setProperty('--ex', ex + 'px');
    el.style.setProperty('--ey', ey + 'px');
    arena.appendChild(el);
    setTimeout(() => el.remove(), 620);
  }
}

function spawnScorch(x, y, size) {
  const el = document.createElement('div');
  el.className = 'scorch';
  el.style.width = size + 'px';
  el.style.height = size * 0.4 + 'px';
  el.style.left = (x - size/2) + 'px';
  el.style.top = (y - size*0.2) + 'px';
  arena.appendChild(el);
  setTimeout(() => el.remove(), 1450);
}

function shake(mag){
  const frames = [
    {x:-mag,y:mag*0.5},{x:mag*0.8,y:-mag*0.6},{x:-mag*0.6,y:-mag*0.4},
    {x:mag,y:mag*0.3},{x:-mag*0.4,y:mag*0.6},{x:mag*0.3,y:-mag*0.3},{x:0,y:0}
  ];
  let i = 0;
  const iv = setInterval(() => {
    if (i >= frames.length) { clearInterval(iv); arena.style.transform = ''; return; }
    arena.style.transform = `translate(${frames[i].x}px, ${frames[i].y}px)`;
    i++;
  }, 30);
}

function bigBlast(x, y){
  // layered core bursts
  spawnBoom(x, y, 65, '#D85A30');
  spawnBoom(x - 24, y - 12, 36, '#ffb27a');
  spawnBoom(x + 26, y + 6, 32, '#ffb27a');
  spawnBoom(x, y - 22, 30, '#F0997B');
  setTimeout(() => spawnBoom(x + 10, y + 8, 40, '#D85A30'), 60);
  setTimeout(() => spawnBoom(x - 16, y - 4, 26, '#ffb27a'), 100);

  // shockwave rings, staggered and growing
  spawnRing(x, y, 40);
  setTimeout(() => spawnRing(x, y, 55), 80);
  setTimeout(() => spawnRing(x, y, 70), 160);

  // scorch + embers
  spawnScorch(x, y, 100);
  spawnEmbers(x, y, 18);
}

function skyBeam(){
  darkOverlay.style.opacity = '0.78';
  const fy = floorY();
  const targetX = arena.clientWidth / 2;
  const startY = -20;
  const endY = fy;
  const beamDuration = 260;

  const beam = document.createElementNS("http://www.w3.org/2000/svg","rect");
  beam.setAttribute("x", targetX - 5);
  beam.setAttribute("y", startY);
  beam.setAttribute("width", "10");
  beam.setAttribute("height", "10");
  beam.setAttribute("fill", "#ffb27a");
  beam.setAttribute("filter", "url(#glow)");
  svg.appendChild(beam);

  const beamStart = performance.now();

  function animateBeam(now){
    const t = Math.min(1, (now - beamStart) / beamDuration);
    const eased = t * t;
    const y = startY + (endY - startY) * eased;
    beam.setAttribute("y", startY);
    beam.setAttribute("height", Math.max(10, y - startY));

    if (t < 1) {
      requestAnimationFrame(animateBeam);
    } else {
      beam.remove();
      bigBlast(targetX, fy);

      flash.style.transition = "opacity 0.03s";
      flash.style.opacity = "0.9";
      targetDot.style.filter = 'brightness(2.2)';
      targetDot.style.transform = 'translateX(-50%) scale(1.4)';
      shake(8);
      setTimeout(() => {
        flash.style.transition = "opacity 0.25s";
        flash.style.opacity = "0";
        targetDot.style.filter = 'none';
        targetDot.style.transform = 'translateX(-50%) scale(1)';
      }, 70);
      setTimeout(() => { darkOverlay.style.opacity = '0'; }, 500);
    }
  }
  requestAnimationFrame(animateBeam);
}

btn.addEventListener('click', skyBeam);
</script>
