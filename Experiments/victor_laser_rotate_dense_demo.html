<style>
@keyframes boom-pop {
  0% { transform: scale(0.2); opacity: 1; }
  60% { transform: scale(1.3); opacity: 0.8; }
  100% { transform: scale(1.8); opacity: 0; }
}
.boom {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  animation: boom-pop 0.4s ease-out forwards;
}
@keyframes ring-expand {
  0% { transform: scale(0.1); opacity: 0.9; }
  100% { transform: scale(1); opacity: 0; }
}
.ring {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  border: 3px solid #ffb27a;
  animation: ring-expand 0.55s ease-out forwards;
}
@keyframes ember-fly {
  0% { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--ex), var(--ey)) scale(0.3); opacity: 0; }
}
.ember {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  animation: ember-fly 0.6s ease-out forwards;
}
</style>
<h2 class="sr-only">Demo of a beam rotating across a ground line with dense, violent chained explosions after it finishes</h2>
<div id="arena-wrap" style="position: relative; height: 320px; background: var(--surface-1); border-radius: 12px; overflow: hidden; border: 0.5px solid var(--border); transition: background 0.15s;">
  <div id="dark-overlay" style="position:absolute; inset:0; background:#05070a; opacity:0; pointer-events:none; transition: opacity 0.12s;"></div>
  <div id="ground-line" style="position:absolute; left:20px; right:20px; bottom:40px; height:4px; background:#639922;"></div>
  <svg id="fx-svg" width="100%" height="100%" style="position:absolute; top:0; left:0; pointer-events:none;">
    <defs>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
  </svg>
  <div id="origin-dot" style="position:absolute; top:36px; left:50px; width:10px; height:10px; margin:-5px; border-radius:50%; background:#378ADD;"></div>
  <div id="flash-overlay" style="position:absolute; inset:0; background:#ffd9c2; opacity:0; pointer-events:none;"></div>
</div>

<div style="display:flex; gap:12px; margin-top:1rem;">
  <button id="wipe-btn">Laser sweep</button>
</div>

<script>
const arena = document.getElementById('arena-wrap');
const darkOverlay = document.getElementById('dark-overlay');
const svg = document.getElementById('fx-svg');
const flash = document.getElementById('flash-overlay');
const btn = document.getElementById('wipe-btn');
const originDot = document.getElementById('origin-dot');
const groundLine = document.getElementById('ground-line');

const TARGET_COUNT = 8;

function spawnBoom(x, y, size, color) {
  const el = document.createElement('div');
  el.className = 'boom';
  el.style.width = size + 'px';
  el.style.height = size + 'px';
  el.style.left = (x - size/2) + 'px';
  el.style.top = (y - size/2) + 'px';
  el.style.background = color;
  arena.appendChild(el);
  setTimeout(() => el.remove(), 420);
}
function spawnRing(x, y, size) {
  const el = document.createElement('div');
  el.className = 'ring';
  el.style.width = size + 'px';
  el.style.height = size + 'px';
  el.style.left = (x - size/2) + 'px';
  el.style.top = (y - size/2) + 'px';
  arena.appendChild(el);
  setTimeout(() => el.remove(), 570);
}
function spawnEmbers(x, y, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 20 + Math.random() * 55;
    const ex = Math.cos(angle) * dist;
    const ey = Math.sin(angle) * dist * 0.6 - 12;
    const size = 3 + Math.random() * 5;
    const el = document.createElement('div');
    el.className = 'ember';
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.left = (x - size/2) + 'px';
    el.style.top = (y - size/2) + 'px';
    el.style.background = Math.random() > 0.5 ? '#ffb27a' : '#F0997B';
    el.style.setProperty('--ex', ex + 'px');
    el.style.setProperty('--ey', ey + 'px');
    arena.appendChild(el);
    setTimeout(() => el.remove(), 620);
  }
}

function hitExplosion(x, y) {
  // dense cluster of overlapping bursts around the point, not just one
  const burstCount = 5 + Math.floor(Math.random() * 3);
  for (let i = 0; i < burstCount; i++) {
    const ox = x + (Math.random() - 0.5) * 50;
    const oy = y + (Math.random() - 0.5) * 26;
    const size = 20 + Math.random() * 34;
    const color = Math.random() > 0.5 ? '#D85A30' : '#ffb27a';
    setTimeout(() => spawnBoom(ox, oy, size, color), i * 18);
  }
  spawnRing(x, y, 34);
  setTimeout(() => spawnRing(x, y, 46), 60);
  spawnEmbers(x, y, 14);
}

function shake(mag){
  const frames = [
    {x:-mag,y:mag*0.5},{x:mag*0.8,y:-mag*0.6},{x:-mag*0.6,y:-mag*0.4},
    {x:mag,y:mag*0.3},{x:-mag*0.4,y:mag*0.6},{x:mag*0.3,y:-mag*0.3},{x:0,y:0}
  ];
  let i = 0;
  const iv = setInterval(() => {
    if (i >= frames.length) { clearInterval(iv); arena.style.transform = ''; return; }
    arena.style.transform = `translate(${frames[i].x}px, ${frames[i].y}px)`;
    i++;
  }, 30);
}

function laserSweep(){
  darkOverlay.style.opacity = '0.78';

  const arenaRect = arena.getBoundingClientRect();
  const originRect = originDot.getBoundingClientRect();
  const originX = originRect.left - arenaRect.left + originRect.width/2;
  const originY = originRect.top - arenaRect.top + originRect.height/2;

  const groundRect = groundLine.getBoundingClientRect();
  const floorY = groundRect.top - arenaRect.top + groundRect.height/2;
  const groundLeft = groundRect.left - arenaRect.left;
  const groundRight = groundRect.right - arenaRect.left;

  const positions = [];
  for (let i = 0; i < TARGET_COUNT; i++) {
    const x = groundLeft + (groundRight - groundLeft) * ((i + 0.5) / TARGET_COUNT);
    positions.push({ x, y: floorY });
  }

  const thetaMax = Math.atan2((groundRight - 10) - originX, floorY - originY);

  const beam = document.createElementNS("http://www.w3.org/2000/svg","line");
  beam.setAttribute("x1", originX);
  beam.setAttribute("y1", originY);
  beam.setAttribute("x2", originX);
  beam.setAttribute("y2", floorY);
  beam.setAttribute("stroke", "#E24B4A");
  beam.setAttribute("stroke-width", "5");
  beam.setAttribute("stroke-linecap", "round");
  beam.setAttribute("filter", "url(#glow)");
  svg.appendChild(beam);

  const duration = 500;
  const start = performance.now();

  function animate(now){
    const t = Math.min(1, (now - start) / duration);
    const eased = 1 - Math.pow(1 - t, 2);
    const theta = thetaMax * eased;

    const dy = floorY - originY;
    const tipX = originX + dy * Math.tan(theta);
    const tipY = floorY;

    beam.setAttribute("x2", tipX);
    beam.setAttribute("y2", tipY);

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      beam.style.transition = 'opacity 0.15s';
      beam.style.opacity = '0';
      setTimeout(() => beam.remove(), 150);

      positions.forEach((pos, i) => {
        setTimeout(() => {
          hitExplosion(pos.x, pos.y);
          shake(5);
        }, i * 65);
      });

      const totalHitTime = TARGET_COUNT * 65;
      setTimeout(() => {
        flash.style.transition = 'opacity 0.03s';
        flash.style.opacity = '0.75';
        shake(10);
        setTimeout(() => {
          flash.style.transition = 'opacity 0.25s';
          flash.style.opacity = '0';
        }, 60);
        setTimeout(() => { darkOverlay.style.opacity = '0'; }, 300);
      }, totalHitTime);
    }
  }
  requestAnimationFrame(animate);
}

btn.addEventListener('click', laserSweep);
</script>
