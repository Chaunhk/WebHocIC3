    <meta charset="UTF-8">

                <div class="student-text-name" id="topbar-user-text">Họ và tên:<br>Lớp:</div>
            </div>
            <button class="btn-topbar-action" id="btn-topbar-main" onclick="handleTopbarAction()">Đăng Xuất</button>
        </div>

        <div id="view-topics" class="topic-box" style="display: none; max-width: 500px;">
            <h2>CHỌN BỘ ĐỀ THI</h2>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn-submit-auth" style="margin-top:0; background: #e67e22;" onclick="switchToMyHome()">🏠 Nhà của tôi</button>
            </div>
            <div class="grid-topics" id="container-topics"></div>
        </div>
        <div id="view-myhome">
            <div class="myhome-layout">
                <div class="home-main-panels">
                    <div class="home-left-panel">
                        <div class="stats-white-card" id="home-stats-details">
                            Level: <br> Exp: <br> Power:
                        </div>
                        <div class="value-white-card" id="home-coin-val">🪙 0</div>
                        <div class="value-white-card" id="home-win-val">Thắng: ⚔️ 0</div>
                    </div>
                    <div class="home-center-panel">
                        <img class="pet-image" id="display-pet-img" src="" alt="Pet Avatar" onerror="this.src='https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=200'">
                    </div>
                    <div class="home-right-panel">
                        <div class="bxh-badge">BXH</div>
                        <ul class="bxh-list" id="home-bxh-container">
                            <li class="bxh-item"><span>1. Đang tải...</span></li>
                        </ul>
                    </div>
                </div>
                <div class="home-bottom-actions">
                    <div class="pet-action-group-left">
                        <button class="btn-pet-action" onclick="handleFeedPet()">🍖 Cho ăn</button>
                        <button class="btn-pet-action btn-fight" onclick="handlePvPBattle()">⚔️ Chiến đấu</button>
                    </div>
                    <button class="btn-topbar-action" style="padding: 12px 24px;" onclick="switchToTopics()">Thoát 🚪</button>
                </div>
            </div>
        </div>
        <div id="view-quiz" style="display: none;">
            <div class="quiz-header" style="margin-bottom: 15px;">
                <span id="txt-question-index">Câu 1/45</span>
                <div class="timer" id="txt-timer">45 : 00</div>
            </div>
            <div class="quiz-body" id="dynamic-question-box" style="min-height: 280px; position: relative;"></div>
            <div class="quiz-footer">
                <button class="btn-nav" onclick="openMenu()">Mục lục</button>
                <div>
                    <button class="btn-submit-quiz" id="btn-submit" onclick="submitQuiz()" style="display:none; background: #5b5b77;">Nộp bài</button>
                    <button class="btn-nav" id="btn-prev" onclick="changeQuestion(-1)">Lùi lại</button>
                    <button class="btn-nav" id="btn-next" onclick="changeQuestion(1)">Câu kế tiếp</button>
                </div>
            </div>
        </div>
        <div id="view-result" style="display: none;">
            <div class="quiz-body result-view" style="min-height: 300px; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                <div class="quiz-title-display" id="result-topic-name" style="font-size: 1.5rem; margin-bottom: 20px;">KẾT QUẢ</div>
                <div class="result-score" id="score-display" style="font-size: 2.2rem; font-weight: normal; color: #000; margin: 10px 0;">Kết quả</div>
                <div class="bonus-box" id="bonus-coin-display"></div>
                <p id="stats-display" style="font-size: 1.1rem; color: #555; margin-bottom: 30px;"></p>
                <div style="display: flex; gap: 15px; position: absolute; bottom: 20px; right: 20px;">
                    <button class="btn-topbar-action" style="background:#22254b;" onclick="reloadToTopics()">Thoát</button>
                    <button class="btn-topbar-action" style="background:#22254b;" onclick="reviewQuiz()">Xem lại bài</button>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="modal-menu" id="menuModal">
    <div class="modal-content">
        <h3>Danh sách câu hỏi</h3>
        <div class="grid-questions" id="grid-container"></div>
        <button class="btn-close-modal" onclick="closeMenu()">Đóng</button>
    </div>
</div>
<div id="battle-overlay">
    <h1 style="color: #e74c3c; font-style: italic; text-shadow: 2px 2px 8px #000; margin-bottom: 30px;">🔥 PET ĐẠI CHIẾN 🔥</h1>
    <div class="battle-arena">
        <div class="battle-fighter my-side">
            <img id="battle-my-pet" src="" alt="My Pet">
            <p id="battle-my-name">Bạn</p>
        </div>
        <div class="battle-vs">VS</div>
        <div class="battle-fighter enemy-side">
            <img id="battle-enemy-pet" src="" alt="Enemy Pet">
            <p id="battle-enemy-name">Đối thủ</p>
        </div>
    </div>
    <h3 style="color: #cbd5e0; letter-spacing: 2px;">Đang giao tranh dữ dội...</h3>
</div>
</body>
</html>
