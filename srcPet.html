<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hệ Thống Pet - Trắc Nghiệm IC3</title>
    <link rel="stylesheet" href="Css/style.css" />
    <script src="Js/SrcPet.js"></script>
  </head>
  <body>
    <div class="quiz-wrapper">
      <div class="quiz-container">
        <!-- Pet Home Screen -->
        <div id="view-myhome">
          <div class="myhome-layout">
            <div class="home-main-panels">
              <div class="home-left-panel">
                <div class="stats-white-card" id="home-stats-details">
                  Level: <br />
                  Exp: <br />
                  Power:
                </div>
                <div class="value-white-card" id="home-coin-val">🪙 0</div>
                <div class="value-white-card" id="home-win-val">
                  Thắng: ⚔️ 0
                </div>
              </div>
              <div class="home-center-panel">
                <img
                  class="pet-image"
                  id="display-pet-img"
                  src=""
                  alt="Pet Avatar"
                  onerror="
                    this.src =
                      'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=200'
                  "
                />
              </div>
              <div class="home-right-panel">
                <div class="bxh-badge">BXH</div>
                <ul class="bxh-list" id="home-bxh-container">
                  <li class="bxh-item"><span>1. Đang tải...</span></li>
                </ul>
              </div>
            </div>
            <div class="home-bottom-actions">
              <div class="pet-action-group-left">
                <button class="btn-pet-action" onclick="handleFeedPet()">
                  🍖 Cho ăn
                </button>
                <button
                  class="btn-pet-action btn-fight"
                  onclick="handlePvPBattle()"
                >
                  ⚔️ Chiến đấu
                </button>
              </div>
              <button
                class="btn-topbar-action"
                style="padding: 12px 24px"
                id="btnExit"
              >
                Thoát 🚪
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Battle Overlay -->
    <div id="battle-overlay">
      <h1
        style="
          color: #e74c3c;
          font-style: italic;
          text-shadow: 2px 2px 8px #000;
          margin-bottom: 30px;
        "
      >
        🔥 PET ĐẠI CHIẾN 🔥
      </h1>
      <div class="battle-arena">
        <div class="battle-fighter my-side">
          <img id="battle-my-pet" src="" alt="My Pet" />
          <p id="battle-my-name">Bạn</p>
        </div>
        <div class="battle-vs">VS</div>
        <div class="battle-fighter enemy-side">
          <img id="battle-enemy-pet" src="" alt="Enemy Pet" />
          <p id="battle-enemy-name">Đối thủ</p>
        </div>
      </div>
      <h3 style="color: #cbd5e0; letter-spacing: 2px">
        Đang giao tranh dữ dội...
      </h3>
    </div>
  </body>
</html>
