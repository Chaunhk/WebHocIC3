<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <!-- <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; connect-src *;"> -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tin Học IC3</title>
    <link rel="stylesheet" href="Css/style.css" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script src="Js/SrcTest.js"></script>
    <script src="Js/AutoScrollMobile.js"></script>
  </head>
  <body>
    <div class="quiz-wrapper">
      <!-- POPUP MỤC LỤC -->
      <div class="menu-modal" id="menuModal">
        <div class="menu-modal-header">
          <div class="menu-modal-title">Danh Sách Câu Hỏi</div>
          <button class="menu-modal-close" id="menuModalClose">&times;</button>
        </div>
        <div class="menu-grid" id="menuGridBlock"></div>
      </div>
      <!-- ══════════════ MÀN HÌNH LÀM BÀI ══════════════ -->
      <div class="screen active" id="screenQuiz">
        <div class="top-bar">
          <div class="question-counter" id="questionCounter">
            Đang tải câu hỏi
          </div>
          <div class="timer" id="countdown">45 : 00</div>
        </div>

        <div class="main-content" id="quizMainContent">
          <button class="quit-btn" id="btnQuit">Thoát</button>
          <button class="reset-btn" id="btnReset">Đặt lại</button>
          <!-- Câu hỏi được render động bởi app.js -->
        </div>

        <div class="bottom-bar">
          <div class="right-nav">
            <button
              class="nav-btn btn-dark btn btn-sm btn-secondary"
              id="btnMenuToggle"
            >
              Mục lục
            </button>
            <button
              class="nav-btn btn-dark btn btn-sm btn-secondary"
              id="btnBackToResult"
              style="display: none"
            >
              Quay lại Kết quả
            </button>
          </div>
          <div style="flex: 1"></div>
          <div class="right-nav gap-1 gap-md-2">
            <button
              class="nav-btn btn-dark btn btn-sm btn-secondary"
              id="btnSubmit"
            >
              Nộp bài
            </button>
            <button
              class="nav-btn btn-dark btn btn-sm btn-secondary"
              id="btnPrev"
            >
              <span class="d-none d-md-inline">Lùi lại</span>
              <span class="d-inline d-md-none">‹</span>
            </button>
            <button
              class="nav-btn btn-dark btn btn-sm btn-secondary"
              id="btnNext"
            >
              <span class="d-none d-md-inline">Câu kế tiếp</span>
              <span class="d-inline d-md-none">›</span>
            </button>
          </div>
        </div>
      </div>
      <!-- /screenQuiz -->

      <!-- ══════════════ MÀN HÌNH KẾT QUẢ ══════════════ -->
      <div class="screen" id="screenResult">
        <div class="top-bar">
          <div class="user-info-block">
            <div class="avatar-duck">🦆</div>
            <div class="user-text">
              Họ và tên: <span id="lbName">...</span><br />
              Lớp: <span id="lbClass">...</span>
            </div>
          </div>
          <button
            class="nav-btn btn-dark"
            id="btnExitFromResult"
            style="position: absolute; right: 24px"
          >
            Đăng Xuất
          </button>
        </div>

        <div class="main-content" style="position: relative">
          <div class="result-box">
            <div style="font-size: 1.8rem; font-weight: bold; color: #333">
              Kết quả
            </div>
            <div class="result-score" id="scoreText">0 / 0 Câu Đúng</div>
          </div>
          <div class="action-container-right">
            <button class="nav-btn btn-dark" id="btnExit">Thoát</button>
            <button class="nav-btn btn-dark" id="btnReview">Xem lại bài</button>
          </div>
        </div>
      </div>
      <!-- /screenResult -->
    </div>
    <!-- /quiz-wrapper -->
  </body>
  <script>
    // Initialize (optional - uses defaults)
    AutoScroll.init({ SCROLL_SPEED: 30 });

    // Use it!
    bindDragDrop();
  </script>
</html>
